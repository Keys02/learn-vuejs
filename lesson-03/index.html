<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
</head>
<body class="h-full grid place-items-center">
   <div id="app">
        <section class="mt-2">
            <h1 class="font-bold mb-2">In Progress</h1>
            <ul>
                <li v-for="assignment in assignments.filter(a => !a.complete)" :key="assignment.id">
                    <label>
                        {{ assignment.name }}
                        <input type="checkbox" v-model="assignment.complete">
                    </label>
                </li>
            </ul>
        </section>

        <section class="mt-2">
            <h1 class="font-bold">Completed Assignments</h1>
            <ul>
                <li v-for="assignment in assignments.filter(ca => ca.complete)" :key="assignment.id">
                    <label>
                        {{ assignment.name }}
                        <input type="checkbox" v-model="assignment.complete">
                    </label>
                </li>
            </ul>
        </section>
   </div> 
   <script>
    let app = {
        data() {
            return {
                assignments: [
                    {id: 1, name: 'Clean my room', complete: false},
                    {id: 2, name: 'Walk the dog', complete: false},
                    {id: 3, name: 'Do my homework', complete: false},
                ]
            }
        }

        
    }

    Vue.createApp(app).mount('#app')
   </script>
</body>
</html>
